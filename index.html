<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robocon Pro | Digital Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-main text-white">
    
    <div id="sideMenu" class="side-nav">
    <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">&times;</a>
    
    <div class="menu-section">
        <h3>COMPONENTS</h3>
        <a onclick="filterCategory('Sensor')">Sensors (Touch/IR)</a>
        <a onclick="filterCategory('PCB')">PCB Boards</a>
        <a onclick="filterCategory('Module')">Circuit Modules</a>
    </div>

    <div class="menu-section">
        <h3>MOTORS</h3>
        <a onclick="filterCategory('Gear Motor')">Gear Motors</a>
        <a onclick="filterCategory('Dynamo')">Dynamo Motors</a>
        <a onclick="filterCategory('Drone Motor')">Drone/BLDC Motors</a>
    </div>

    <div class="admin-link-wrapper">
        <button onclick="openAdmin()" class="admin-glow-btn">ADMIN ACCESS</button>
    </div>
</div>

<span class="menu-icon" onclick="toggleNav()">&#9776;</span>


    <header class="navbar p-4 sticky top-0 z-50 flex justify-between items-center shadow-2xl">
        <h1 class="logo-text">ROBOCON <span class="text-blue-400">PRO</span></h1>
        <div onclick="toggleSidebar()" class="relative cursor-pointer hover:scale-110 transition">
            <span id="cart-count" class="badge">0</span>
            <img src="https://img.icons8.com/neon/96/shopping-cart.png" class="h-10 w-10">
        </div>
    </header>

    <main id="product-grid" class="max-w-7xl mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        </main>

    <div id="productModal" class="modal-overlay hidden">
        <div class="modal-content glass-effect border-shiny p-6 max-w-4xl w-full mx-4">
            <button onclick="closeModal('productModal')" class="absolute top-4 right-4 text-3xl">&times;</button>
            <div class="md:flex gap-8">
                <div class="flex-1">
                    <img id="detail-img" src="" class="w-full h-64 object-contain bg-white rounded-2xl p-4">
                </div>
                <div class="flex-1 space-y-4">
                    <h2 id="detail-name" class="text-3xl font-black text-blue-400"></h2>
                    <p id="detail-desc" class="text-gray-400 text-sm leading-relaxed"></p>
                    <div class="text-yellow-400">⭐⭐⭐⭐⭐ <span class="text-gray-500 text-xs">(Verified Reviews)</span></div>
                    <p id="detail-price" class="text-2xl font-bold"></p>
                    <div class="flex items-center gap-4 py-4">
                        <button onclick="updateQty(-1)" class="qty-btn">-</button>
                        <span id="qty-num" class="text-xl font-bold">1</span>
                        <button onclick="updateQty(1)" class="qty-btn">+</button>
                    </div>
                    <button onclick="addToCatalogue()" class="glow-btn-blue w-full py-4 uppercase">Add to Catalogue</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="sidebar hidden p-6 flex flex-col">
        <h2 class="text-2xl font-black mb-6 border-b border-gray-800 pb-2 text-blue-400">FINAL CATALOGUE</h2>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t border-gray-800">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span>Total:</span>
                <span id="final-total" class="text-green-400">₹0</span>
            </div>
            <button onclick="openInfoLayout()" class="glow-btn-green w-full py-4 uppercase font-black">Finalize Order</button>
        </div>
    </div>

    <div id="infoLayout" class="modal-overlay hidden">
        <div class="modal-content glass-effect max-w-md p-8 border-shiny">
            <h2 class="text-2xl font-bold mb-6 text-blue-400">Delivery Details</h2>
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Customer Name" class="form-input w-full">
                <input type="text" id="cust-address" placeholder="Hostel/Address" class="form-input w-full">
                <input type="tel" id="cust-phone" placeholder="WhatsApp Number" class="form-input w-full">
                <button onclick="confirmOrder()" class="glow-btn-blue w-full py-3 mt-4">CONFIRM & TRACK</button>
            </div>
        </div>
    </div>

<div id="adminModal" class="admin-window hidden">
    <div class="admin-box glass-effect border-shiny">
        <h2 class="text-2xl font-black text-blue-400 mb-6 text-center">ADD NEW PRODUCT</h2>
        
        <div class="space-y-4">
            <label class="text-xs text-gray-400">Select Section:</label>
            <select id="new-category" class="form-input w-full">
                <option value="Sensor">Sensors (IR/Touch)</option>
                <option value="PCB">PCB Boards</option>
                <option value="Gear Motor">Gear Motors</option>
                <option value="Drone Motor">Drone Motors</option>
                <option value="Module">Circuit Modules</option>
            </select>

            <input type="text" id="new-name" placeholder="Product Name" class="form-input w-full">
            <input type="number" id="new-price" placeholder="Price (₹)" class="form-input w-full">
            <input type="text" id="new-img" placeholder="Image URL (GitHub Raw Link)" class="form-input w-full">
            <textarea id="new-desc" placeholder="Product Description / Specialty" class="form-input w-full h-24"></textarea>

            <button onclick="saveProduct()" class="glow-btn-green w-full py-3 mt-4">ADD PRODUCT LIVE</button>
            <button onclick="closeModal('adminModal')" class="w-full text-gray-500 text-xs mt-2 underline">Cancel & Exit</button>
        </div>
    </div>
</div>

    <script src="script.js"></script>

</body>

</html>
