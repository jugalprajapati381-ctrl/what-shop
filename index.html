<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <aside class="fixed left-0 top-20 w-48 p-4 hidden md:block">
        <h3 class="text-blue-400 font-bold mb-4">FILTERS</h3>
        <button onclick="filterItems('all')" class="block mb-2 hover:text-blue-300">All Items</button>
        <button onclick="filterItems('sensors')" class="block mb-2 hover:text-blue-300">Sensors</button>
        <button onclick="filterItems('boards')" class="block mb-2 hover:text-blue-300">Boards</button>
    </aside>

    <div class="max-w-5xl mx-auto p-6 md:ml-56">
        <h1 class="text-3xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">TECH CATALOGUE</h1>
        
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="glass-card p-4 rounded-3xl" data-category="boards">
                <img src="arduino.jpg" class="w-full h-40 object-cover rounded-2xl mb-4 cursor-pointer" onclick="openDescription('Arduino Uno R3', 'Standard board for IoT projects. 14 Digital pins, 6 Analog pins.')">
                <h3 class="text-lg font-bold">Arduino Uno R3</h3>
                <div class="flex items-center gap-1 text-yellow-400 text-xs mb-2">⭐⭐⭐⭐⭐ <span class="text-gray-500">(45 reviews)</span></div>
                <p class="text-blue-400 font-black text-xl mb-4">₹550</p>
                
                <div class="flex items-center justify-between bg-slate-800 rounded-xl p-2">
                    <button onclick="changeQty('uno', -1)" class="px-3 py-1 bg-slate-700 rounded-lg">-</button>
                    <span id="qty-uno" class="font-bold">1</span>
                    <button onclick="changeQty('uno', 1)" class="px-3 py-1 bg-slate-700 rounded-lg">+</button>
                </div>
                <button onclick="addToCart('Arduino Uno R3', 550, 'uno')" class="w-full mt-4 bg-blue-600 py-3 rounded-xl font-bold">ADD TO CART</button>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-2xl rounded-3xl p-8 border border-blue-500/30">
            <h2 class="text-2xl font-bold mb-6">Your Catalogue List</h2>
            <div id="cart-items-list" class="max-h-60 overflow-y-auto mb-6">
                </div>
            <div class="flex justify-between items-center border-t border-slate-700 pt-6">
                <span class="text-xl font-bold">Total: <span id="modal-total">₹0</span></span>
                <button onclick="sendOrder()" class="glow-button px-10 py-4 rounded-2xl font-black text-white">ORDER ON WHATSAPP</button>
            </div>
            <button onclick="closeCart()" class="mt-4 text-gray-500 text-sm underline w-full text-center">Continue Shopping</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
