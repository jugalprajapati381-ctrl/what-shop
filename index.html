<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Shop - Order via WhatsApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-600">Apka Digital Store</h1>
            <span class="text-gray-500 text-sm">Open 24/7</span>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 hover:scale-105 transition-transform">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Product" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="text-lg font-semibold">Premium Watch</h3>
                <p class="text-gray-600 text-sm mb-4">Limited Edition - High Quality</p>
                <div class="flex justify-between items-center">
                    <span class="text-xl font-bold text-gray-900">₹1,999</span>
                    <button onclick="orderViaWhatsApp('Premium Watch', '1999')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium flex items-center">
                        Order on WhatsApp
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 hover:scale-105 transition-transform">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Product" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="text-lg font-semibold">Wireless Headphones</h3>
                <p class="text-gray-600 text-sm mb-4">Bass Boosted - 20hr Battery</p>
                <div class="flex justify-between items-center">
                    <span class="text-xl font-bold text-gray-900">₹2,499</span>
                    <button onclick="orderViaWhatsApp('Wireless Headphones', '2499')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium flex items-center">
                        Order on WhatsApp
                    </button>
                </div>
            </div>
        </div>

    </div>

    <footer class="text-center p-10 text-gray-400 text-sm">
        <p>© 2026 Developed by [Your Name] - B.Tech Developer</p>
    </footer>

    <script>
        function orderViaWhatsApp(productName, price) {
            // Replace with the shopkeeper's real WhatsApp number
            const phoneNumber = "911234567890"; 
            
            const message = `Hello! I want to order:\n\n*Product:* ${productName}\n*Price:* ₹${price}\n\nPlease confirm my order.`;
            
            // This creates the WhatsApp link
            const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            
            // Opens WhatsApp in a new tab
            window.open(whatsappURL, '_blank');
        }
    </script>

</body>
</html>
