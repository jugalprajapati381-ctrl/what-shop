<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electro-Store Pro | Tech Components</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-navy">

    <header class="navbar p-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="logo-text">ELECTRO-STORE <span class="text-xs text-blue-300">PRO</span></h1>
        <div onclick="toggleCart()" class="cart-icon-wrapper cursor-pointer">
            <span id="cart-count" class="badge">0</span>
            <img src="https://img.icons8.com/neon/96/shopping-cart.png" class="h-10 w-10">
        </div>
    </header>

    <div class="filter-bar max-w-7xl mx-auto p-4 flex gap-4 overflow-x-auto">
        <button onclick="filter('all')" class="filter-btn active">All Items</button>
        <button onclick="filter('sensor')" class="filter-btn">Sensors</button>
        <button onclick="filter('micro')" class="filter-btn">Boards</button>
        <button onclick="filter('drone')" class="filter-btn">Drone Parts</button>
    </div>

    <main id="product-grid" class="max-w-7xl mx-auto p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        </main>

    <div id="productDetailModal" class="modal">
        <div class="modal-content glass-effect">
            <span class="close-btn" onclick="closeDetail()">&times;</span>
            <div class="modal-body md:flex gap-8">
                <div class="image-gallery flex-1">
                    <img id="main-detail-img" src="" class="main-img">
                    <div id="thumb-gallery" class="flex gap-2 mt-4"></div>
                </div>
                <div class="details flex-1">
                    <h2 id="detail-title" class="text-3xl font-black text-blue-400"></h2>
                    <div class="flex items-center gap-2 my-2 text-yellow-400" id="detail-stars"></div>
                    <p id="detail-desc" class="text-gray-400 my-4"></p>
                    <p id="detail-price" class="text-2xl font-bold text-white"></p>
                    
                    <div class="increment-box my-6">
                        <button onclick="updateModalQty(-1)">-</button>
                        <span id="modal-qty">1</span>
                        <button onclick="updateModalQty(1)">+</button>
                    </div>
                    <button id="modal-add-btn" class="glow-btn-blue w-full">ADD TO FINAL CATALOGUE</button>
                </div>
            </div>
            <div class="reviews-section mt-8 border-t border-gray-700 pt-4">
                <h3 class="text-lg font-bold mb-4 italic">Customer Reviews</h3>
                <div id="review-list"></div>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="sidebar glass-effect">
        <h2 class="text-2xl font-black mb-6">FINAL CATALOGUE</h2>
        <div id="cart-items" class="flex-1 overflow-y-auto"></div>
        <div class="order-summary border-t border-gray-700 pt-4">
            <p>Total Items: <span id="final-qty">0</span></p>
            <p class="text-2xl font-black text-green-400">Total: <span id="final-total">₹0</span></p>
            <button onclick="placeOrder()" class="place-order-btn glow-green">PLACE ORDER ON WHATSAPP</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
