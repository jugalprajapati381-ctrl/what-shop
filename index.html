<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional WhatsApp Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <nav class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold text-white">Smart Digital Store</h1>
        <div class="relative">
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 py-1 rounded-full font-bold">0</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 grid grid-cols-2 md:grid-cols-3 gap-4">
        <div class="bg-white p-3 rounded-lg shadow-sm border">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300" class="w-full h-32 object-cover rounded">
            <h3 class="font-bold mt-2">Premium Watch</h3>
            <p class="text-green-600 font-bold">₹1,999</p>
            <button onclick="addToCart('Premium Watch', 1999)" class="w-full mt-2 bg-blue-500 text-white py-1 rounded hover:bg-blue-600">Add to Cart</button>
        </div>

        <div class="bg-white p-3 rounded-lg shadow-sm border">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" class="w-full h-32 object-cover rounded">
            <h3 class="font-bold mt-2">Headphones</h3>
            <p class="text-green-600 font-bold">₹2,499</p>
            <button onclick="addToCart('Headphones', 2499)" class="w-full mt-2 bg-blue-500 text-white py-1 rounded hover:bg-blue-600">Add to Cart</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center shadow-2xl">
        <div>
            <p class="text-gray-500 text-sm">Total Amount:</p>
            <p class="text-xl font-bold text-gray-900" id="total-price">₹0</p>
        </div>
        <button onclick="sendOrder()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-700 animate-pulse">
            Place Order on WhatsApp
        </button>
    </div>

    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({ name, price });
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = "₹" + total;
        }

        function sendOrder() {
            if (cart.length === 0) {
                alert("Please add items to cart first!");
                return;
            }

            // Create Order Message
            let message = "📦 *NEW ORDER RECEIVED*\n\n";
            let total = 0;

            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - ₹${item.price}\n`;
                total += item.price;
            });

            message += `\n💰 *Total Amount: ₹${total}*`;
            message += `\n\n📍 *Customer Details:* \n(Please write your Name & Address here)`;

            const phoneNumber = "911234567890"; // Shopkeeper's Number
            const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappURL, '_blank');
        }
    </script>
</body>
</html>
